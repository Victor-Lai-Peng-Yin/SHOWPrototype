<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早上破冰小遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95em;
        }

        .section-title {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .player-config {
            margin-bottom: 25px;
        }

        .attr-row {
            margin-bottom: 15px;
        }

        .attr-label {
            margin-bottom: 6px;
            color: #555;
            font-weight: bold;
        }

        .level-group {
            display: flex;
            gap: 10px;
        }

        .level-button {
            flex: 1;
            padding: 12px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 10px;
            border: 2px solid #ccc;
            background: #f9f9f9;
            cursor: pointer;
            transition: all 0.2s;
        }

        .level-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .level-button.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .ai-summary {
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.95em;
            color: #444;
        }

        .ai-summary ul {
            margin-top: 8px;
            padding-left: 20px;
        }

        .ai-summary li {
            margin-bottom: 4px;
        }

        .start-button {
            width: 100%;
            padding: 18px;
            font-size: 1.3em;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .hint-text {
            margin-top: 10px;
            text-align: center;
            font-size: 0.9em;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>早上破冰小遊戲</h1>
        <div class="subtitle">設定玩家能力，早上隨機玩一個破冰小遊戲。</div>

        <div class="player-config">
            <div class="section-title">玩家能力等級設定（A：最強，C：最弱）</div>

            <div class="attr-row">
                <div class="attr-label">廚藝等級（影響烤肉小遊戲難度）</div>
                <div class="level-group" data-attr="cooking">
                    <button class="level-button" data-attr="cooking" data-level="A">A 級</button>
                    <button class="level-button selected" data-attr="cooking" data-level="B">B 級</button>
                    <button class="level-button" data-attr="cooking" data-level="C">C 級</button>
                </div>
            </div>

            <div class="attr-row">
                <div class="attr-label">體力等級（影響跑酷競賽跳躍與 AI）</div>
                <div class="level-group" data-attr="stamina">
                    <button class="level-button" data-attr="stamina" data-level="A">A 級</button>
                    <button class="level-button selected" data-attr="stamina" data-level="B">B 級</button>
                    <button class="level-button" data-attr="stamina" data-level="C">C 級</button>
                </div>
            </div>

            <div class="attr-row">
                <div class="attr-label">魅力等級（影響舞蹈節拍秀判定與加成）</div>
                <div class="level-group" data-attr="charm">
                    <button class="level-button" data-attr="charm" data-level="A">A 級</button>
                    <button class="level-button selected" data-attr="charm" data-level="B">B 級</button>
                    <button class="level-button" data-attr="charm" data-level="C">C 級</button>
                </div>
            </div>
        </div>

        <div class="ai-summary">
            <div class="section-title">AI 競爭對手預設等級</div>
            <ul>
                <li>高冷男：魅力 <strong>A</strong>、廚藝 <strong>C</strong>、體力 <strong>B</strong></li>
                <li>暖男：魅力 <strong>B</strong>、廚藝 <strong>A</strong>、體力 <strong>C</strong></li>
                <li>體育男（運動男）：魅力 <strong>B</strong>、廚藝 <strong>C</strong>、體力 <strong>A</strong></li>
            </ul>
            <div style="margin-top: 6px; font-size: 0.85em; color: #666;">
                不同小遊戲會只用到相關的能力值（例如：烤肉只用廚藝，跑酷競賽只用體力，舞蹈秀只用魅力）。
            </div>
        </div>

        <button class="start-button" id="startButton">隨機開始一個早上破冰小遊戲</button>
        <div class="hint-text">小遊戲結束或點「返回主頁面」時，會回到主頁並前進到下一個時段。</div>
    </div>

    <script>
        const PLAYER_KEY = 'forbiddenShow_player';

        function loadPlayer() {
            try {
                const raw = localStorage.getItem(PLAYER_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) {}
            // 預設男主角三項都是 C
            return { cooking: 'C', stamina: 'C', charm: 'C' };
        }

        function savePlayer(state) {
            localStorage.setItem(PLAYER_KEY, JSON.stringify(state));
        }

        const playerState = loadPlayer();

        // 綁定等級按鈕並根據當前玩家能力初始化選擇狀態
        document.querySelectorAll('.level-group').forEach(group => {
            const attr = group.dataset.attr;
            const currentLevel = playerState[attr] || 'C';

            group.querySelectorAll('.level-button').forEach(button => {
                // 初始化 selected 狀態
                if (button.dataset.level === currentLevel) {
                    button.classList.add('selected');
                } else {
                    button.classList.remove('selected');
                }

                button.addEventListener('click', () => {
                    const level = button.dataset.level;
                    playerState[attr] = level;
                    group.querySelectorAll('.level-button').forEach(btn => {
                        btn.classList.toggle('selected', btn === button);
                    });
                });
            });
        });

        // 開始隨機小遊戲
        document.getElementById('startButton').addEventListener('click', () => {
            // 把目前設定的玩家能力存回主狀態
            savePlayer(playerState);

            const games = ['bbq', 'dance', 'runner'];
            const pick = games[Math.floor(Math.random() * games.length)];

            // 共用參數（玩家三項能力）
            const params = new URLSearchParams({
                playerCooking: playerState.cooking,
                playerStamina: playerState.stamina,
                playerCharm: playerState.charm,

                // 廚藝（烤肉小遊戲用）
                warmCooking: 'A',   // 暖男
                coldCooking: 'C',   // 高冷男
                sportCooking: 'C',  // 體育男

                // 體力（跑酷競賽用）
                warmStamina: 'C',
                coldStamina: 'B',
                sportStamina: 'A',

                // 魅力（舞蹈節拍秀用）
                warmCharm: 'B',
                coldCharm: 'A',
                sportCharm: 'B'
            });

            let target = '';
            if (pick === 'bbq') {
                target = './烤肉小遊戲/index.html';
            } else if (pick === 'dance') {
                target = './舞蹈節拍秀/index.html';
            } else {
                target = './runner-race.html';
            }

            window.location.href = target + '?' + params.toString();
        });
    </script>
</body>
</html>
