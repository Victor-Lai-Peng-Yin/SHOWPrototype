<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乒乓球小遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .setup-panel {
            margin-bottom: 20px;
        }

        .stamina-display {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .stamina-level-selector {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .level-button {
            flex: 1;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            border: 3px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .level-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .level-button.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .level-button.level-c {
            color: #d9534f;
        }

        .level-button.level-c.selected {
            background: linear-gradient(135deg, #d9534f 0%, #c9302c 100%);
            color: white;
        }

        .level-button.level-b {
            color: #f0ad4e;
        }

        .level-button.level-b.selected {
            background: linear-gradient(135deg, #f0ad4e 0%, #ec971f 100%);
            color: white;
        }

        .level-button.level-a {
            color: #5cb85c;
        }

        .level-button.level-a.selected {
            background: linear-gradient(135deg, #5cb85c 0%, #449d44 100%);
            color: white;
        }

        .game-button {
            width: 100%;
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .game-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .game-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .game-area {
            position: relative;
            width: 100%;
            height: 500px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #87CEEB 100%);
            border: 4px solid #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .table {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: #fff;
            transform: translateY(-50%);
        }

        .net {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                #fff 0px,
                #fff 10px,
                #333 10px,
                #333 20px
            );
            transform: translateX(-50%);
        }

        .paddle {
            position: absolute;
            width: 15px;
            height: 80px;
            background: #333;
            border-radius: 5px;
            transition: top 0.1s linear;
        }

        .paddle.player {
            left: 20px;
            background: #667eea;
        }

        .paddle.ai {
            right: 20px;
            background: #d9534f;
        }

        .ball {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            transition: left 0.05s linear, top 0.05s linear;
        }

        .ball.smash {
            background: #ff4444;
            box-shadow: 0 0 15px rgba(255, 68, 68, 1);
            animation: smashGlow 0.3s infinite;
        }

        @keyframes smashGlow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .score-display {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            font-size: 2em;
            font-weight: bold;
        }

        .match-info {
            text-align: center;
            padding: 15px;
            background: #e7f3ff;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: #0066cc;
        }

        .result-container {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            display: none;
        }

        .result-title {
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            color: #333;
        }

        .final-ranking {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            display: none;
        }

        .final-ranking-title {
            font-size: 1.8em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .final-ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-size: 1.2em;
        }

        .final-ranking-item.winner {
            background: rgba(255, 215, 0, 0.3);
            border: 2px solid #ffd700;
            font-weight: bold;
            font-size: 1.4em;
        }

        .status-text {
            text-align: center;
            margin: 10px 0;
            font-size: 1.2em;
            color: #666;
        }

        .ai-stamina-selector {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .ai-stamina-title {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .ai-stamina-buttons {
            display: flex;
            gap: 5px;
        }

        .ai-level-button {
            flex: 1;
            padding: 8px;
            font-size: 0.9em;
            font-weight: bold;
            border: 2px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .ai-level-button:hover {
            transform: translateY(-1px);
        }

        .ai-level-button.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🏓 乒乓球小遊戲 🏓</h1>
        
        <div class="setup-panel" id="setupPanel">
            <div class="stamina-display">
                <div style="font-size: 1.1em; font-weight: bold; margin-bottom: 10px;">玩家體力等級</div>
                <div class="stamina-level-selector">
                    <button class="level-button level-c" data-level="C">C級<br><span style="font-size: 0.7em;">(低)</span></button>
                    <button class="level-button level-b selected" data-level="B">B級<br><span style="font-size: 0.7em;">(中)</span></button>
                    <button class="level-button level-a" data-level="A">A級<br><span style="font-size: 0.7em;">(高)</span></button>
                </div>
                <div style="margin-top: 10px; font-size: 0.9em; color: #666;">
                    當前等級：<span id="currentLevel" style="font-weight: bold;">B級</span>
                </div>
            </div>

            <div class="ai-stamina-selector">
                <div class="ai-stamina-title">AI對手體力等級</div>
                <div style="margin-bottom: 15px;">
                    <div style="font-size: 0.9em; margin-bottom: 5px;">暖男</div>
                    <div class="ai-stamina-buttons">
                        <button class="ai-level-button" data-opponent="暖男" data-level="C">C級</button>
                        <button class="ai-level-button selected" data-opponent="暖男" data-level="B">B級</button>
                        <button class="ai-level-button" data-opponent="暖男" data-level="A">A級</button>
                    </div>
                </div>
                <div style="margin-bottom: 15px;">
                    <div style="font-size: 0.9em; margin-bottom: 5px;">高冷男</div>
                    <div class="ai-stamina-buttons">
                        <button class="ai-level-button" data-opponent="高冷男" data-level="C">C級</button>
                        <button class="ai-level-button selected" data-opponent="高冷男" data-level="B">B級</button>
                        <button class="ai-level-button" data-opponent="高冷男" data-level="A">A級</button>
                    </div>
                </div>
                <div>
                    <div style="font-size: 0.9em; margin-bottom: 5px;">體育男</div>
                    <div class="ai-stamina-buttons">
                        <button class="ai-level-button" data-opponent="體育男" data-level="C">C級</button>
                        <button class="ai-level-button selected" data-opponent="體育男" data-level="B">B級</button>
                        <button class="ai-level-button" data-opponent="體育男" data-level="A">A級</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="match-info" id="matchInfo" style="display: none;">
            <div id="matchText">準備開始比賽...</div>
        </div>

        <div class="score-display" id="scoreDisplay" style="display: none;">
            <div>
                <div style="font-size: 0.5em; color: #666;">玩家</div>
                <div id="playerScore">0</div>
            </div>
            <div style="font-size: 0.5em; color: #666; align-self: center;">VS</div>
            <div>
                <div style="font-size: 0.5em; color: #666;" id="opponentName">對手</div>
                <div id="opponentScore">0</div>
            </div>
        </div>

        <div class="game-area" id="gameArea" style="display: none;">
            <div class="table"></div>
            <div class="net"></div>
            <div class="paddle player" id="playerPaddle"></div>
            <div class="paddle ai" id="aiPaddle"></div>
            <div class="ball" id="ball"></div>
        </div>

        <div class="status-text" id="statusText">比賽即將自動開始…</div>

        <div class="result-container" id="resultContainer">
            <div class="result-title" id="resultTitle">比賽結果</div>
            <div id="resultContent"></div>
        </div>

        <div class="final-ranking" id="finalRanking">
            <div class="final-ranking-title">🏆 最終排名 🏆</div>
            <div id="finalRankingList"></div>
        </div>
    </div>

    <script>
        // 遊戲配置
        const GameConfig = {
            WIN_SCORE: 5,
            BALL_SPEED: 5,
            SMASH_SPEED: 8,
            PADDLE_SPEED: 8,
            AI_PADDLE_SPEED: {
                'C': 4,   // C級：較慢
                'B': 5,   // B級：中等（降低難度）
                'A': 6    // A級：較快（降低難度）
            },
            AI_REACTION_DELAY: {
                'C': 0.15,  // C級：反應延遲較大
                'B': 0.10,  // B級：反應延遲中等
                'A': 0.05   // A級：反應延遲較小
            },
            SMASH_PROBABILITY: {
                'C': 0.1,  // C級：10%殺球機率
                'B': 0.3,  // B級：30%殺球機率
                'A': 0.6   // A級：60%殺球機率
            },
            PADDLE_HEIGHT: {
                'C': 60,  // C級：判定方塊最短（60px）
                'B': 80,  // B級：判定方塊中等（80px）
                'A': 100  // A級：判定方塊最長（100px）
            }
        };

        // 對手名稱
        const OPPONENTS = ['暖男', '高冷男', '體育男'];

        // 女主角好感度設定（魅力 / 廚藝 / 體力）
        const AFFECTION_KEY = 'forbiddenShow_affection';
        const AFFECTION_TODAY_KEY = 'forbiddenShow_affection_today';
        const HEROINES = {
            '搖滾少女': { charm: 'A', cooking: 'C', stamina: 'C' },
            '清純少女': { charm: 'C', cooking: 'A', stamina: 'C' },
            '運動少女': { charm: 'C', cooking: 'C', stamina: 'A' },
            '高冷大姐姐': { charm: 'B', cooking: 'A', stamina: 'C' },
            '地雷女': { charm: 'A', cooking: 'C', stamina: 'B' }
        };

        function loadAffection() {
            try {
                const raw = localStorage.getItem(AFFECTION_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) {}
            const base = {};
            const players = ['玩家', '暖男', '高冷男', '體育男'];
            Object.keys(HEROINES).forEach(hero => {
                base[hero] = {};
                players.forEach(p => { base[hero][p] = 0; });
            });
            return base;
        }

        function saveAffection(state) {
            localStorage.setItem(AFFECTION_KEY, JSON.stringify(state));
        }

        function loadAffectionToday() {
            try {
                const raw = localStorage.getItem(AFFECTION_TODAY_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) {}
            const base = {};
            const players = ['玩家', '暖男', '高冷男', '體育男'];
            Object.keys(HEROINES).forEach(hero => {
                base[hero] = {};
                players.forEach(p => { base[hero][p] = 0; });
            });
            return base;
        }

        function saveAffectionToday(state) {
            localStorage.setItem(AFFECTION_TODAY_KEY, JSON.stringify(state));
        }

        function heroineBonusLevel(heroName, gameType) {
            const h = HEROINES[heroName];
            if (!h) return 'C';
            if (gameType === 'cooking') return h.cooking;
            if (gameType === 'charm') return h.charm;
            return h.stamina;
        }

        function calcAffectionDelta(level, rank) {
            const baseByRank = { 1: 3, 2: 2, 3: 1, 4: 0 };
            const base = baseByRank[rank] || 0;
            const mult = level === 'A' ? 2 : level === 'B' ? 1 : 0.5;
            return Math.round(base * mult);
        }

        function applyAffectionFromRanking(gameType, rankingArray) {
            const affectionTotal = loadAffection();
            const affectionToday = loadAffectionToday();

            rankingArray.forEach(item => {
                const participant = item.name;
                const rank = item.rank;
                Object.keys(HEROINES).forEach(hero => {
                    const lvl = heroineBonusLevel(hero, gameType);
                    const delta = calcAffectionDelta(lvl, rank);

                    if (!affectionTotal[hero]) affectionTotal[hero] = {};
                    if (typeof affectionTotal[hero][participant] !== 'number') affectionTotal[hero][participant] = 0;
                    affectionTotal[hero][participant] += delta;

                    if (!affectionToday[hero]) affectionToday[hero] = {};
                    if (typeof affectionToday[hero][participant] !== 'number') affectionToday[hero][participant] = 0;
                    affectionToday[hero][participant] += delta;
                });
            });

            saveAffection(affectionTotal);
            saveAffectionToday(affectionToday);
        }

        // 遊戲狀態
        let gameState = {
            playerStamina: 'B',
            aiStamina: {
                '暖男': 'B',
                '高冷男': 'B',
                '體育男': 'B'
            },
            currentMatch: null,
            semiFinalResults: [],
            thirdPlaceMatch: null,
            finalMatch: null,
            playerWins: 0
        };

        let game = null;
        let animationFrameId = null;

        // DOM元素
        const setupPanel = document.getElementById('setupPanel');
        const matchInfo = document.getElementById('matchInfo');
        const matchText = document.getElementById('matchText');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const playerScore = document.getElementById('playerScore');
        const opponentScore = document.getElementById('opponentScore');
        const opponentNameEl = document.getElementById('opponentName');
        const gameArea = document.getElementById('gameArea');
        const playerPaddle = document.getElementById('playerPaddle');
        const aiPaddle = document.getElementById('aiPaddle');
        const ball = document.getElementById('ball');
        const statusText = document.getElementById('statusText');
        const resultContainer = document.getElementById('resultContainer');
        const resultTitle = document.getElementById('resultTitle');
        const resultContent = document.getElementById('resultContent');
        const finalRanking = document.getElementById('finalRanking');
        const finalRankingList = document.getElementById('finalRankingList');
        const currentLevel = document.getElementById('currentLevel');

        // 從網址讀取主選單可能帶入的體力等級
        (function initStaminaFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const normalize = (v) => (v === 'A' || v === 'B' || v === 'C') ? v : null;
            const urlPlayerStamina = normalize(urlParams.get('playerStamina'));
            const urlWarmStamina = normalize(urlParams.get('warmStamina'));
            const urlColdStamina = normalize(urlParams.get('coldStamina'));
            const urlSportStamina = normalize(urlParams.get('sportStamina'));

            if (urlPlayerStamina) gameState.playerStamina = urlPlayerStamina;
            if (urlWarmStamina) gameState.aiStamina['暖男'] = urlWarmStamina;
            if (urlColdStamina) gameState.aiStamina['高冷男'] = urlColdStamina;
            if (urlSportStamina) gameState.aiStamina['體育男'] = urlSportStamina;
        })();

        // 玩家體力等級選擇
        const levelButtons = document.querySelectorAll('.level-button');
        levelButtons.forEach(button => {
            button.addEventListener('click', () => {
                levelButtons.forEach(btn => btn.classList.remove('selected'));
                button.classList.add('selected');
                gameState.playerStamina = button.dataset.level;
                currentLevel.textContent = gameState.playerStamina + '級';
            });
        });

        // 依照 gameState.playerStamina 初始化玩家按鈕與文字
        levelButtons.forEach(btn => {
            btn.classList.toggle('selected', btn.dataset.level === gameState.playerStamina);
        });
        currentLevel.textContent = gameState.playerStamina + '級';

        // AI體力等級選擇
        const aiLevelButtons = document.querySelectorAll('.ai-level-button');
        aiLevelButtons.forEach(button => {
            button.addEventListener('click', () => {
                const opponent = button.dataset.opponent;
                const level = button.dataset.level;
                // 移除同組其他按鈕的選中狀態
                document.querySelectorAll(`.ai-level-button[data-opponent="${opponent}"]`).forEach(btn => {
                    btn.classList.remove('selected');
                });
                button.classList.add('selected');
                gameState.aiStamina[opponent] = level;
            });
        });

        // 依照 gameState.aiStamina 初始化 AI 按鈕
        aiLevelButtons.forEach(button => {
            const opponent = button.dataset.opponent;
            const level = button.dataset.level;
            button.classList.toggle('selected', gameState.aiStamina[opponent] === level);
        });

        // 直接自動開始比賽（不需要手動按鈕）
        (function autoStart() {
            setupPanel.style.display = 'none';
            startTournament();
        })();
        function startTournament() {
            gameState.semiFinalResults = [];
            gameState.playerWins = 0;

            // 隨機選擇玩家的對手
            const playerOpponent = OPPONENTS[Math.floor(Math.random() * OPPONENTS.length)];
            const otherOpponents = OPPONENTS.filter(name => name !== playerOpponent);
            
            matchText.textContent = `初賽：玩家 VS ${playerOpponent} | ${otherOpponents[0]} VS ${otherOpponents[1]}`;
            matchInfo.style.display = 'block';
            
            setTimeout(() => {
                startMatch('player', playerOpponent, 'semi');
            }, 2000);
        }

        function startMatch(playerName, opponentName, matchType) {
            // 獲取對手的體力等級（從設定中獲取）
            const opponentStamina = gameState.aiStamina[opponentName] || 'B';
            
            game = new PingPongGame(
                playerName === 'player' ? gameState.playerStamina : 'B',
                opponentName,
                opponentStamina,
                matchType
            );
            
            gameState.currentMatch = {
                playerName,
                opponentName,
                matchType
            };

            matchText.textContent = `${playerName === 'player' ? '玩家' : playerName} VS ${opponentName}`;
            opponentNameEl.textContent = opponentName;
            
            scoreDisplay.style.display = 'flex';
            gameArea.style.display = 'block';
            resultContainer.style.display = 'none';
            statusText.textContent = '比賽進行中！移動滑鼠控制球拍';

            game.start();
            gameLoop();
        }


        // 滑鼠控制
        gameArea.addEventListener('mousemove', (e) => {
            if (game && game.gameState === 'PLAYING') {
                const rect = gameArea.getBoundingClientRect();
                const mouseY = e.clientY - rect.top;
                game.updatePlayerPaddle(mouseY);
            }
        });

        // 遊戲循環
        function gameLoop() {
            if (!game) return;

            game.update();
            render();

            if (game.gameState === 'FINISHED') {
                handleMatchEnd();
            } else {
                animationFrameId = requestAnimationFrame(gameLoop);
            }
        }

        function render() {
            if (!game) return;

            // 更新球拍位置
            playerPaddle.style.top = game.playerPaddleY + 'px';
            aiPaddle.style.top = game.aiPaddleY + 'px';

            // 更新球位置
            ball.style.left = game.ballX + 'px';
            ball.style.top = game.ballY + 'px';

            // 更新殺球效果
            if (game.isSmash) {
                ball.classList.add('smash');
            } else {
                ball.classList.remove('smash');
            }

            // 更新分數
            playerScore.textContent = game.playerScore;
            opponentScore.textContent = game.opponentScore;
            
            // 顯示獲勝提示
            if (game.gameState === 'FINISHED') {
                if (game.playerScore >= GameConfig.WIN_SCORE) {
                    statusText.textContent = `🎉 玩家獲勝！比分 ${game.playerScore}:${game.opponentScore}`;
                } else {
                    statusText.textContent = `😢 ${gameState.currentMatch.opponentName}獲勝！比分 ${game.playerScore}:${game.opponentScore}`;
                }
            }
        }

        function handleMatchEnd() {
            cancelAnimationFrame(animationFrameId);
            
            const winner = game.playerScore >= GameConfig.WIN_SCORE ? 'player' : gameState.currentMatch.opponentName;
            
            if (gameState.currentMatch.matchType === 'semi') {
                // 初賽結束
                const matchResult = {
                    player: gameState.currentMatch.playerName === 'player' ? '玩家' : gameState.currentMatch.playerName,
                    opponent: gameState.currentMatch.opponentName,
                    winner: winner === 'player' ? '玩家' : winner,
                    loser: winner === 'player' ? gameState.currentMatch.opponentName : (gameState.currentMatch.playerName === 'player' ? '玩家' : gameState.currentMatch.playerName)
                };
                gameState.semiFinalResults.push(matchResult);

                // 如果只有一場初賽結果，模擬另一場初賽
                if (gameState.semiFinalResults.length === 1) {
                    const otherMatch = simulateAIMatch();
                    gameState.semiFinalResults.push(otherMatch);
                }

                // 顯示初賽結果
                showSemiFinalResults();

                // 確保有兩場初賽結果後才開始下一階段
                if (gameState.semiFinalResults.length >= 2) {
                    setTimeout(() => {
                        startThirdPlaceMatch();
                    }, 3000);
                }
            } else if (gameState.currentMatch.matchType === 'third') {
                // 第三名爭奪戰結束
                gameState.thirdPlaceMatch = {
                    winner: winner === 'player' ? '玩家' : winner,
                    loser: winner === 'player' ? gameState.currentMatch.opponentName : '玩家'
                };
                
                // 顯示第三名爭奪戰結果
                showThirdPlaceResult();
                
                // 開始決賽
                setTimeout(() => {
                    startFinalMatch();
                }, 3000);
            } else {
                // 決賽結束
                // 將 'player' 轉換為 '玩家'
                const finalWinner = winner === 'player' ? '玩家' : winner;
                showFinalResults(finalWinner);
            }
        }

        function simulateAIMatch() {
            // 找出還沒有比賽過的對手
            const usedOpponents = new Set();
            gameState.semiFinalResults.forEach(r => {
                if (r.player !== '玩家') usedOpponents.add(r.player);
                if (r.opponent !== '玩家') usedOpponents.add(r.opponent);
            });

            const availableOpponents = OPPONENTS.filter(name => !usedOpponents.has(name));
            
            // 如果可用對手不足2個，從所有對手中選擇
            let player1, player2;
            if (availableOpponents.length >= 2) {
                player1 = availableOpponents[0];
                player2 = availableOpponents[1];
            } else {
                // 從所有對手中隨機選擇兩個
                const allOpponents = [...OPPONENTS];
                const randomIndex1 = Math.floor(Math.random() * allOpponents.length);
                player1 = allOpponents[randomIndex1];
                allOpponents.splice(randomIndex1, 1);
                const randomIndex2 = Math.floor(Math.random() * allOpponents.length);
                player2 = allOpponents[randomIndex2];
            }

            const winner = Math.random() > 0.5 ? player1 : player2;
            const loser = winner === player1 ? player2 : player1;

            return {
                player: player1,
                opponent: player2,
                winner: winner,
                loser: loser
            };
        }

        function showSemiFinalResults() {
            gameArea.style.display = 'none';
            scoreDisplay.style.display = 'none';
            resultContainer.style.display = 'block';
            resultTitle.textContent = '初賽結果';
            
            let html = '<div style="margin: 10px 0;">';
            gameState.semiFinalResults.forEach(result => {
                html += `<div style="padding: 10px; margin: 5px 0; background: white; border-radius: 5px;">`;
                html += `${result.player} VS ${result.opponent}<br>`;
                html += `<strong>獲勝者：${result.winner}</strong>`;
                html += `</div>`;
            });
            html += '</div>';
            resultContent.innerHTML = html;
        }

        function startThirdPlaceMatch() {
            // 確保有足夠的初賽結果
            if (gameState.semiFinalResults.length < 2) {
                console.error('初賽結果不足，無法開始第三名爭奪戰');
                return;
            }

            // 找出兩個輸家
            const loser1 = gameState.semiFinalResults[0].loser;
            const loser2 = gameState.semiFinalResults[1].loser;

            if (!loser1 || !loser2) {
                console.error('無法確定第三名爭奪戰對手');
                return;
            }

            // 判斷玩家是否在其中
            const playerIsLoser = loser1 === '玩家' || loser2 === '玩家';
            const playerOpponent = playerIsLoser ? (loser1 === '玩家' ? loser2 : loser1) : null;

            if (playerIsLoser && playerOpponent) {
                matchText.textContent = `第三名爭奪戰：玩家 VS ${playerOpponent}`;
                matchInfo.style.display = 'block';
                
                setTimeout(() => {
                    startMatch('player', playerOpponent, 'third');
                }, 2000);
            } else {
                // 玩家不在輸家名單中，模擬AI對戰
                matchText.textContent = `第三名爭奪戰：${loser1} VS ${loser2}`;
                matchInfo.style.display = 'block';
                
                setTimeout(() => {
                    const thirdWinner = Math.random() > 0.5 ? loser1 : loser2;
                    gameState.thirdPlaceMatch = {
                        winner: thirdWinner,
                        loser: thirdWinner === loser1 ? loser2 : loser1
                    };
                    showThirdPlaceResult();
                    setTimeout(() => {
                        startFinalMatch();
                    }, 3000);
                }, 2000);
            }
        }

        function showThirdPlaceResult() {
            gameArea.style.display = 'none';
            scoreDisplay.style.display = 'none';
            resultContainer.style.display = 'block';
            resultTitle.textContent = '第三名爭奪戰結果';
            
            const result = gameState.thirdPlaceMatch;
            resultContent.innerHTML = `
                <div style="padding: 15px; margin: 10px 0; background: white; border-radius: 5px;">
                    <div style="font-size: 1.2em; font-weight: bold; margin-bottom: 10px;">第三名：${result.winner}</div>
                    <div style="color: #666;">第四名：${result.loser}</div>
                </div>
            `;
        }

        function startFinalMatch() {
            // 確保有足夠的初賽結果
            if (gameState.semiFinalResults.length < 2) {
                console.error('初賽結果不足，無法開始決賽');
                return;
            }

            // 找出兩個贏家
            const winner1 = gameState.semiFinalResults[0].winner;
            const winner2 = gameState.semiFinalResults[1].winner;

            if (!winner1 || !winner2) {
                console.error('無法確定決賽對手');
                return;
            }

            // 判斷玩家是否在其中
            const playerIsWinner = winner1 === '玩家' || winner2 === '玩家';
            const playerOpponent = playerIsWinner ? (winner1 === '玩家' ? winner2 : winner1) : null;

            if (playerIsWinner && playerOpponent) {
                matchText.textContent = `決賽：玩家 VS ${playerOpponent}`;
                matchInfo.style.display = 'block';
                
                setTimeout(() => {
                    startMatch('player', playerOpponent, 'final');
                }, 2000);
            } else {
                // 玩家不在贏家名單中，模擬AI對戰
                matchText.textContent = `決賽：${winner1} VS ${winner2}`;
                matchInfo.style.display = 'block';
                
                setTimeout(() => {
                    const finalWinner = Math.random() > 0.5 ? winner1 : winner2;
                    showFinalResults(finalWinner);
                }, 2000);
            }
        }

        function showFinalResults(winner) {
            gameArea.style.display = 'none';
            scoreDisplay.style.display = 'none';
            resultContainer.style.display = 'none';
            matchInfo.style.display = 'none';
            finalRanking.style.display = 'block';

            // 確保winner是正確的格式（'player' -> '玩家'）
            const finalWinner = winner === 'player' ? '玩家' : winner;

            // 構建完整排名
            const ranking = [];
            
            // 第一名：決賽獲勝者
            ranking.push({ name: finalWinner, rank: 1 });
            
            // 第二名：決賽失敗者（找出決賽的另一個參賽者）
            // 決賽的兩個參賽者是兩個初賽的贏家
            const winner1 = gameState.semiFinalResults[0].winner;
            const winner2 = gameState.semiFinalResults[1].winner;
            
            // 決賽失敗者是另一個贏家
            const finalLoser = (finalWinner === winner1) ? winner2 : winner1;
            ranking.push({ name: finalLoser, rank: 2 });
            
            // 第三名：第三名爭奪戰獲勝者
            if (gameState.thirdPlaceMatch) {
                ranking.push({ name: gameState.thirdPlaceMatch.winner, rank: 3 });
                
                // 第四名：第三名爭奪戰失敗者
                ranking.push({ name: gameState.thirdPlaceMatch.loser, rank: 4 });
            } else {
                // 如果沒有第三名爭奪戰結果，使用初賽輸家
                const semiLoser1 = gameState.semiFinalResults[0].loser;
                const semiLoser2 = gameState.semiFinalResults[1].loser;
                ranking.push({ name: semiLoser1, rank: 3 });
                ranking.push({ name: semiLoser2, rank: 4 });
            }

            // 依據乒乓球（體力）最終名次更新女主角好感度
            applyAffectionFromRanking('stamina', ranking);

            finalRankingList.innerHTML = '';
            ranking.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'final-ranking-item' + (item.rank === 1 ? ' winner' : '');
                let rankEmoji = '';
                if (item.rank === 1) rankEmoji = '🥇';
                else if (item.rank === 2) rankEmoji = '🥈';
                else if (item.rank === 3) rankEmoji = '🥉';
                else rankEmoji = '4️⃣';
                
                div.innerHTML = `
                    <div>
                        <span style="font-size: 1.5em; margin-right: 15px;">${rankEmoji}</span>
                        <span>${item.rank}. ${item.name}</span>
                    </div>
                `;
                finalRankingList.appendChild(div);
            });

            // 小遊戲結束數秒後自動回到主頁並前進下一個時段
            setTimeout(() => {
                window.location.href = '../index.html?autoNext=1';
            }, 3000);
        }

        // 乒乓球遊戲類
        class PingPongGame {
            constructor(playerStamina, opponentName, opponentStamina, matchType) {
                this.playerStamina = playerStamina;
                this.opponentName = opponentName;
                this.opponentStamina = opponentStamina;
                this.matchType = matchType;

                // 獲取遊戲區域實際尺寸
                const rect = gameArea.getBoundingClientRect();
                this.gameWidth = rect.width;
                this.gameHeight = rect.height;

                this.gameState = 'WAITING';
                this.playerScore = 0;
                this.opponentScore = 0;

                // 球拍位置（相對於遊戲區域）
                this.paddleWidth = 15;
                // 根據體力等級設置球拍高度
                this.playerPaddleHeight = GameConfig.PADDLE_HEIGHT[this.playerStamina] || 80;
                this.aiPaddleHeight = GameConfig.PADDLE_HEIGHT[this.opponentStamina] || 80;
                this.paddleLeftOffset = 20; // 左側球拍距離左邊的距離
                this.paddleRightOffset = 20; // 右側球拍距離右邊的距離
                
                this.playerPaddleY = (this.gameHeight - this.playerPaddleHeight) / 2;
                this.aiPaddleY = (this.gameHeight - this.aiPaddleHeight) / 2;
                
                // 動態設置球拍高度
                playerPaddle.style.height = this.playerPaddleHeight + 'px';
                aiPaddle.style.height = this.aiPaddleHeight + 'px';
                
                // 球的位置（相對於遊戲區域）
                this.ballRadius = 10;
                this.ballX = this.gameWidth / 2;
                this.ballY = this.gameHeight / 2;
                this.ballSpeedX = 0;
                this.ballSpeedY = 0;
                this.isSmash = false;
                this.servingPlayer = 'player';
                this.lastHitBy = null; // 防止重複碰撞
            }

            start() {
                // 重新獲取遊戲區域尺寸（防止窗口大小改變）
                const rect = gameArea.getBoundingClientRect();
                this.gameWidth = rect.width;
                this.gameHeight = rect.height;
                
                // 重新計算初始位置
                this.playerPaddleY = (this.gameHeight - this.playerPaddleHeight) / 2;
                this.aiPaddleY = (this.gameHeight - this.aiPaddleHeight) / 2;
                this.ballX = this.gameWidth / 2;
                this.ballY = this.gameHeight / 2;
                
                // 確保球拍高度正確
                playerPaddle.style.height = this.playerPaddleHeight + 'px';
                aiPaddle.style.height = this.aiPaddleHeight + 'px';
                
                this.gameState = 'PLAYING';
                this.serve();
            }

            serve() {
                // 根據實際遊戲區域寬度設置發球位置
                const serveOffset = 50;
                this.ballX = this.servingPlayer === 'player' ? 
                    this.paddleLeftOffset + this.paddleWidth + this.ballRadius + 10 : 
                    this.gameWidth - this.paddleRightOffset - this.paddleWidth - this.ballRadius - 10;
                this.ballY = this.gameHeight / 2;
                this.isSmash = false;
                
                // 限制發球角度範圍，避免過於水平的角度（避免球速看起來太快）
                // 原來的角度範圍是 -30度到+30度，當角度接近0度時X方向速度會很大
                // 現在改為 -45度到+45度，但排除接近0度的範圍（-15度到+15度）
                let angle;
                const random = Math.random();
                if (random < 0.5) {
                    // 上半部分：-45度到-15度
                    angle = -(Math.PI / 4 + Math.random() * Math.PI / 12);
                } else {
                    // 下半部分：+15度到+45度
                    angle = Math.PI / 12 + Math.random() * Math.PI / 6;
                }
                
                const speed = GameConfig.BALL_SPEED;
                this.ballSpeedX = Math.cos(angle) * speed * (this.servingPlayer === 'player' ? 1 : -1);
                this.ballSpeedY = Math.sin(angle) * speed;
            }

            update() {
                if (this.gameState !== 'PLAYING') return;

                // 更新AI球拍
                this.updateAIPaddle();

                // 使用更小的步長來檢測碰撞，防止穿透
                const stepCount = Math.max(1, Math.ceil(Math.abs(this.ballSpeedX) + Math.abs(this.ballSpeedY)));
                const stepX = this.ballSpeedX / stepCount;
                const stepY = this.ballSpeedY / stepCount;

                for (let i = 0; i < stepCount; i++) {
                    // 更新球位置
                    this.ballX += stepX;
                    this.ballY += stepY;

                    // 球碰到上下邊界
                    if (this.ballY <= this.ballRadius) {
                        this.ballY = this.ballRadius;
                        this.ballSpeedY = -this.ballSpeedY;
                    } else if (this.ballY >= this.gameHeight - this.ballRadius) {
                        this.ballY = this.gameHeight - this.ballRadius;
                        this.ballSpeedY = -this.ballSpeedY;
                    }

                    // 檢查碰撞
                    if (this.checkCollisions()) {
                        break; // 如果發生碰撞，停止這一步的移動
                    }
                }

                // 檢查得分（使用實際遊戲區域寬度）
                if (this.ballX < -this.ballRadius) {
                    this.opponentScore++;
                    this.checkGameEnd();
                    if (this.gameState === 'PLAYING') {
                        this.servingPlayer = 'opponent';
                        // 重置球位置，等待發球
                        this.ballX = this.gameWidth - this.paddleRightOffset - this.paddleWidth - this.ballRadius - 10;
                        this.ballY = this.gameHeight / 2;
                        this.ballSpeedX = 0;
                        this.ballSpeedY = 0;
                        setTimeout(() => {
                            if (this.gameState === 'PLAYING') {
                                this.serve();
                            }
                        }, 1000);
                    } else {
                        // 遊戲結束，停止球
                        this.ballSpeedX = 0;
                        this.ballSpeedY = 0;
                    }
                } else if (this.ballX > this.gameWidth + this.ballRadius) {
                    this.playerScore++;
                    this.checkGameEnd();
                    if (this.gameState === 'PLAYING') {
                        this.servingPlayer = 'player';
                        // 重置球位置，等待發球
                        this.ballX = this.paddleLeftOffset + this.paddleWidth + this.ballRadius + 10;
                        this.ballY = this.gameHeight / 2;
                        this.ballSpeedX = 0;
                        this.ballSpeedY = 0;
                        setTimeout(() => {
                            if (this.gameState === 'PLAYING') {
                                this.serve();
                            }
                        }, 1000);
                    } else {
                        // 遊戲結束，停止球
                        this.ballSpeedX = 0;
                        this.ballSpeedY = 0;
                    }
                }
            }

            updatePlayerPaddle(mouseY) {
                // 確保球拍不會超出遊戲區域
                this.playerPaddleY = Math.max(0, Math.min(this.gameHeight - this.playerPaddleHeight, mouseY - this.playerPaddleHeight / 2));
            }

            updateAIPaddle() {
                // 根據AI體力等級調整速度和反應
                const aiSpeed = GameConfig.AI_PADDLE_SPEED[this.opponentStamina] || 5;
                const reactionDelay = GameConfig.AI_REACTION_DELAY[this.opponentStamina] || 0.1;
                
                // 預測球的位置（考慮反應延遲）
                const predictedBallY = this.ballY + this.ballSpeedY * reactionDelay * 10;
                const paddleCenter = this.aiPaddleY + this.aiPaddleHeight / 2;
                const targetY = predictedBallY - this.aiPaddleHeight / 2;
                const diff = targetY - paddleCenter;
                
                // 增加反應閾值，讓AI不那麼精準（降低難度）
                const reactionThreshold = 20; // 增加到20，降低AI精準度
                
                if (Math.abs(diff) > reactionThreshold) {
                    // 降低移動速度，讓AI更慢（降低難度）
                    const moveSpeed = aiSpeed * 0.6; // 降低到60%速度
                    this.aiPaddleY += Math.sign(diff) * moveSpeed;
                    this.aiPaddleY = Math.max(0, Math.min(this.gameHeight - this.aiPaddleHeight, this.aiPaddleY));
                }
            }

            checkCollisions() {
                // 玩家球拍碰撞（左側）
                if (this.ballSpeedX < 0 && this.lastHitBy !== 'player') {
                    const paddleLeft = this.paddleLeftOffset;
                    const paddleRight = paddleLeft + this.paddleWidth;
                    const paddleTop = this.playerPaddleY;
                    const paddleBottom = this.playerPaddleY + this.playerPaddleHeight;

                    // 檢查球是否與球拍重疊（使用圓形碰撞檢測）
                    const ballCenterX = this.ballX;
                    const ballCenterY = this.ballY;
                    
                    // 計算球心到矩形的最短距離
                    const closestX = Math.max(paddleLeft, Math.min(ballCenterX, paddleRight));
                    const closestY = Math.max(paddleTop, Math.min(ballCenterY, paddleBottom));
                    const distanceX = ballCenterX - closestX;
                    const distanceY = ballCenterY - closestY;
                    const distanceSquared = distanceX * distanceX + distanceY * distanceY;

                    if (distanceSquared <= this.ballRadius * this.ballRadius) {
                        // 碰撞發生，修正球的位置
                        this.ballX = paddleRight + this.ballRadius + 1;
                        this.hitBall('player');
                        return true;
                    }
                }

                // AI球拍碰撞（右側）
                if (this.ballSpeedX > 0 && this.lastHitBy !== 'opponent') {
                    const paddleLeft = this.gameWidth - this.paddleRightOffset - this.paddleWidth;
                    const paddleRight = paddleLeft + this.paddleWidth;
                    const paddleTop = this.aiPaddleY;
                    const paddleBottom = this.aiPaddleY + this.aiPaddleHeight;

                    // 檢查球是否與球拍重疊（使用圓形碰撞檢測）
                    const ballCenterX = this.ballX;
                    const ballCenterY = this.ballY;
                    
                    // 計算球心到矩形的最短距離
                    const closestX = Math.max(paddleLeft, Math.min(ballCenterX, paddleRight));
                    const closestY = Math.max(paddleTop, Math.min(ballCenterY, paddleBottom));
                    const distanceX = ballCenterX - closestX;
                    const distanceY = ballCenterY - closestY;
                    const distanceSquared = distanceX * distanceX + distanceY * distanceY;

                    if (distanceSquared <= this.ballRadius * this.ballRadius) {
                        // 碰撞發生，修正球的位置
                        this.ballX = paddleLeft - this.ballRadius - 1;
                        this.hitBall('opponent');
                        return true;
                    }
                }

                return false;
            }

            hitBall(hitter) {
                // 防止重複碰撞
                if (this.lastHitBy === hitter) {
                    return;
                }

                const paddleY = hitter === 'player' ? this.playerPaddleY : this.aiPaddleY;
                const paddleHeight = hitter === 'player' ? this.playerPaddleHeight : this.aiPaddleHeight;
                const paddleCenter = paddleY + paddleHeight / 2;
                
                // 計算擊球點相對於球拍中心的位置（-1 到 1）
                const hitPoint = (this.ballY - paddleCenter) / (paddleHeight / 2);
                const clampedHitPoint = Math.max(-1, Math.min(1, hitPoint));
                
                // 根據擊球點計算角度（頂部向上，底部向下）
                // 最大角度為 60 度（π/3）
                const maxAngle = Math.PI / 3;
                const angle = clampedHitPoint * maxAngle;
                
                // 檢查是否殺球
                const stamina = hitter === 'player' ? this.playerStamina : this.opponentStamina;
                const smashProb = GameConfig.SMASH_PROBABILITY[stamina];
                const isSmash = Math.random() < smashProb;

                // 根據擊球位置調整速度（擊中邊緣時速度稍快）
                const speedMultiplier = 1 + Math.abs(clampedHitPoint) * 0.2;

                if (isSmash) {
                    this.isSmash = true;
                    const speed = GameConfig.SMASH_SPEED * speedMultiplier;
                    // 確保球向正確方向移動
                    const direction = hitter === 'player' ? 1 : -1;
                    this.ballSpeedX = Math.abs(Math.cos(angle)) * speed * direction;
                    this.ballSpeedY = Math.sin(angle) * speed;
                } else {
                    this.isSmash = false;
                    const speed = GameConfig.BALL_SPEED * speedMultiplier;
                    const direction = hitter === 'player' ? 1 : -1;
                    this.ballSpeedX = Math.abs(Math.cos(angle)) * speed * direction;
                    this.ballSpeedY = Math.sin(angle) * speed;
                }

                // 記錄最後擊球者，防止重複碰撞
                this.lastHitBy = hitter;
                
                // 短暫延遲後重置，允許球離開球拍
                setTimeout(() => {
                    if (this.lastHitBy === hitter) {
                        this.lastHitBy = null;
                    }
                }, 100);
            }

            checkGameEnd() {
                // 先得5分者獲勝
                if (this.playerScore >= GameConfig.WIN_SCORE) {
                    this.gameState = 'FINISHED';
                } else if (this.opponentScore >= GameConfig.WIN_SCORE) {
                    this.gameState = 'FINISHED';
                }
            }
        }
